name: publish

on:
  push:
    branches:
      - main
      - next

jobs:
  release:
    if: "!startsWith(github.event.head_commit.message, 'bump:')"
    # Branch strategy:
    # - next: Commitizen creates prerelease bumps, tags, changelog entries, and releases
    # - main: Commitizen creates the final stable bump, tag, changelog entry, and release
    #   using a GitHub App installation token that is allowed to bypass the protected-branch rules
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      revision: ${{ steps.next_cz.outputs.version || steps.main_cz.outputs.version }}

    steps:
      - name: Check out next
        if: github.ref == 'refs/heads/next'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release app token
        if: github.ref == 'refs/heads/main'
        id: release_app_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Check out main with release app token
        if: github.ref == 'refs/heads/main'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.release_app_token.outputs.token }}

      - name: Bump prerelease version and changelog
        if: github.ref == 'refs/heads/next'
        id: next_cz
        uses: commitizen-tools/commitizen-action@0.27.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          commitizen_version: 4.13.9
          changelog_increment_filename: body.md
          prerelease: rc

      - name: Bump stable version and changelog
        if: github.ref == 'refs/heads/main'
        id: main_cz
        uses: commitizen-tools/commitizen-action@0.27.1
        with:
          github_token: ${{ steps.release_app_token.outputs.token }}
          commitizen_version: 4.13.9
          changelog_increment_filename: body.md

      - name: Create prerelease GitHub release
        if: github.ref == 'refs/heads/next'
        uses: softprops/action-gh-release@v2
        with:
          body_path: body.md
          tag_name: ${{ steps.next_cz.outputs.version }}
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create stable GitHub release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          body_path: body.md
          prerelease: false
          tag_name: ${{ steps.main_cz.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    runs-on: ubuntu-latest
    needs: release

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.revision }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: "x64"

      - name: Install & configure Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
          virtualenvs-path: .venv
          installer-parallel: true

      - name: Install dependencies
        run: poetry install --no-interaction --no-root

      - name: Build
        run: poetry build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/p/mad-prefect
    permissions:
      id-token: write

    steps:
      - name: Download dists
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
